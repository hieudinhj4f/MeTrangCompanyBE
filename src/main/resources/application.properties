spring.application.name=demo

# ==========================================
# CẤU HÌNH DATABASE (AUTO SWITCH LOCAL/CLOUD)
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:metrang_db}
spring.datasource.username=${DB_USERNAME:user_metrang}
spring.datasource.password=${DB_PASSWORD:password123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Run SQL fixes before Hibernate updates schema (fixes product_id / warehouse_id cast errors)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# QUAN TRỌNG: Hiện giá trị thực tế của các tham số và kết quả trả về
logging.level.org.hibernate.orm.jdbc.bind=trace

# Fail fast with a clear message if DB is unreachable (seconds)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10